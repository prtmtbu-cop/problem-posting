<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard Problem Posting Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.dashboard{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:180px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.card h2{
margin:10px 0;
font-size:28px;
}

.search{
text-align:center;
margin-bottom:20px;
}

input{
padding:10px;
width:300px;
border-radius:6px;
border:none;
}

table{
width:100%;
border-collapse:collapse;
background:white;
color:black;
border-radius:8px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
font-size:14px;
text-align:left;
}

th{
background:#1e293b;
color:white;
}

tr:hover{
background:#f1f5f9;
}

.status-open{
background:#ef4444;
color:white;
padding:4px 8px;
border-radius:5px;
}

.status-progress{
background:#facc15;
padding:4px 8px;
border-radius:5px;
}

.status-close{
background:#22c55e;
color:white;
padding:4px 8px;
border-radius:5px;
}

.chart-container{
width:400px;
margin:40px auto;
}

</style>
</head>

<body>

<h1>DASHBOARD PROBLEM POSTING MONITORING</h1>

<div class="dashboard">

<div class="card">
Total Case
<h2 id="total">0</h2>
</div>

<div class="card">
Open
<h2 id="open">0</h2>
</div>

<div class="card">
Progress
<h2 id="progress">0</h2>
</div>

<div class="card">
Close
<h2 id="close">0</h2>
</div>

</div>

<div class="chart-container">
<canvas id="statusChart"></canvas>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search Reservasi / Problem / PIC">
</div>

<table>

<thead>
<tr>
<th>Reservasi</th>
<th>Item</th>
<th>Part Number</th>
<th>Problem</th>
<th>PIC</th>
<th>Tanggal</th>
<th>Status</th>
<th>Foto</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTfCG1zhLg7Kpa3ougm7vm3dx4UnRU4DcUfV8Bl5HplgvQhjH9xXNr-VS7Uy258VBvV8JKnwkMwfziy/pub?gid=1326491725&single=true&output=csv";

let openCount=0;
let progressCount=0;
let closeCount=0;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{

let rows=data.split("\n").slice(1);
let table=document.getElementById("tableBody");

rows.forEach(row=>{

let cols=row.split(",");

if(cols.length<16) return;

let reservasi=cols[3];
let item=cols[4];
let pn=cols[5];
let problem=cols[9];
let pic=cols[8];
let tanggal=cols[10];
let foto=cols[11];
let status=(cols[15] || "").replace(/"/g,"").trim().toLowerCase();

let statusLabel="";
let statusClass="";

if(status==="open"){
openCount++;
statusLabel="Open";
statusClass="status-open";
}

if(status==="progress"){
progressCount++;
statusLabel="Progress";
statusClass="status-progress";
}

if(status==="close"){
closeCount++;
statusLabel="Close";
statusClass="status-close";
}

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${reservasi}</td>
<td>${item}</td>
<td>${pn}</td>
<td>${problem}</td>
<td>${pic}</td>
<td>${tanggal}</td>
<td><span class="${statusClass}">${statusLabel}</span></td>
<td><a href="${foto}" target="_blank">View</a></td>
`;

table.appendChild(tr);

});

let total=openCount+progressCount+closeCount;

document.getElementById("total").innerText=total;
document.getElementById("open").innerText=openCount;
document.getElementById("progress").innerText=progressCount;
document.getElementById("close").innerText=closeCount;

createChart();

});

function createChart(){

new Chart(document.getElementById("statusChart"),{

type:"pie",

data:{
labels:["Open","Progress","Close"],
datasets:[{
data:[openCount,progressCount,closeCount],
backgroundColor:[
"#ef4444",
"#facc15",
"#22c55e"
]
}]
}

});

}

document.getElementById("search").addEventListener("keyup",function(){

let filter=this.value.toUpperCase();
let rows=document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text=row.innerText.toUpperCase();

row.style.display=text.includes(filter)?"":"none";

});

});

</script>

</body>
</html>
